<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VN Stock Data Filler</title>
  <style>
    /* Trae IDE Vibe: Dark Mode */
    body {
      background-color: #1E1E1E;
      color: #FFFFFF;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-size: 13px;
      justify-content: center;
      align-items: center;
      height: 100vh;
      box-sizing: border-box;
    }

    .info-text {
      color: #8C8C8C;
      text-align: center;
      line-height: 1.5;
    }

    button {
      background-color: #8B5CF6; /* Màu tím Trae */
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      font-size: 14px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    button:hover {
      background-color: #7C3AED;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
    }

    button:active {
      background-color: #6D28D9;
      transform: translateY(0);
    }

    .shortcut {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="info-text">
    Chọn các cột (Auto Layout frames) có tiêu đề:<br>
    <b>'Mã CK', 'Ngày tạo', 'Khối lượng', 'Tên báo cáo'</b>
  </div>

  <button id="fillData">Fill Smart Data</button>

  <div class="shortcut">Tự động nhận diện & điền dữ liệu VN Stock</div>

  <script>
    document.getElementById('fillData').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'fill-smart-data' } }, '*');
    };
  </script>
</body>
</html>
